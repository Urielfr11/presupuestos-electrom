<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    body { margin: 0; padding: 10px; background-color: #f0f2f6; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
    #tarjeta-presupuesto {
        max-width: 440px; width: 100%; background: #ffffff; padding: 20px; border-radius: 8px; 
        border: 1px solid #ddd; box-sizing: border-box;
    }
    .btn-descargar {
        background-color: #27ae60; color: white; border: none; padding: 14px 20px; 
        font-size: 15px; font-weight: bold; border-radius: 10px; cursor: pointer; 
        width: 100%; max-width: 440px; margin: 15px auto 20px auto; display: block;
    }
    * { box-sizing: border-box; }
</style>
</head>
<body>

<div id="tarjeta-presupuesto">
    <div style="width: 100%; margin-bottom: 15px;">
        __ENCABEZADO__
    </div>

    <div style="font-size: 11px; background: #f9f9f9; padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #eee;">
        <p style="margin: 3px 0;">👤 <b>CLIENTE:</b> __CLIENTE__</p>
        <p style="margin: 3px 0;">📍 <b>DIRECCIÓN:</b> __DIRECCION__</p>
        <p style="margin: 3px 0;">📅 <b>FECHA:</b> __FECHA__</p>
    </div>

    <div style="background: #FFF7CC; padding: 8px; font-size: 10px; font-weight: bold; display: flex; border-radius: 4px; margin-bottom: 5px;">
        <span style="flex: 2;">SERVICIOS</span>
        <span style="flex: 0.7; text-align: center;">CANT.</span>
        <span style="flex: 1.3; text-align: right;">SUBTOTAL</span>
    </div>
    <div style="margin: 5px 0;">__TABLA__</div>

    <div style="display: flex; justify-content: space-between; align-items: center; background: #FFD700; padding: 10px; border-radius: 4px; font-weight: bold; font-size: 13px; margin-top: 10px;">
        <span>TOTAL</span><span>__TOTAL__</span>
    </div>

    <div style="margin-top: 15px; font-size: 11px; border-top: 1px solid #eee; padding-top: 10px; margin-bottom: 15px;">
        <p style="margin: 0 0 5px 0; font-weight: bold; color: #333;">Observaciones:</p>
        <div style="color: #555; line-height: 1.4;">__DETALLE__</div>
    </div>
    
    <div style="width: 100%; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
        __PIE__
    </div>
</div>

<button class="btn-descargar" onclick="descargarComoImagen()">📲 GUARDAR PRESUPUESTO</button>

<script>
function descargarComoImagen() {
    html2canvas(document.getElementById('tarjeta-presupuesto'), {
        scale: 3,
        width: 440,
        windowWidth: 440
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Presupuesto_ElectroM.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}
</script>
</body>
</html>
